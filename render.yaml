services:
  - type: web
    name: novricana-portfolio
    runtime: static
    plan: free
    branch: master
    buildCommand: npm install -g pnpm@10.4.1 && pnpm install --frozen-lockfile && pnpm run build:static
    staticPublishPath: dist/public
    pullRequestPreviewsEnabled: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: 22.13.0
