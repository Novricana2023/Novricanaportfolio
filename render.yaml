services:
  - type: web
    name: novricana-portfolio
    runtime: node
    plan: free
    buildCommand: npm install -g pnpm@10.4.1 && pnpm install && pnpm build
    startCommand: pnpm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 22.13.0
